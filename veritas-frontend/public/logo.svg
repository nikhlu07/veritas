<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="leafGrad" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="55%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="24" y1="32" x2="24" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>

  <!-- Main leaf shape — elegant, pointed, asymmetric -->
  <path
    d="M24 4 C24 4 8 10 6 26 C4.5 38 14 44 24 44 C34 44 43.5 38 42 26 C40 10 24 4 24 4 Z"
    fill="url(#leafGrad)"
    opacity="0.95"
  />

  <!-- Inner leaf vein / midrib -->
  <path
    d="M24 8 L24 40"
    stroke="#86efac"
    stroke-width="1.2"
    stroke-linecap="round"
    opacity="0.6"
  />

  <!-- Side veins — left -->
  <path d="M24 16 C20 18 14 19 11 23" stroke="#bbf7d0" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/>
  <path d="M24 23 C20 25 15 26 12 29" stroke="#bbf7d0" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <path d="M24 30 C20 31 16 32 14 34" stroke="#bbf7d0" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>

  <!-- Side veins — right -->
  <path d="M24 16 C28 18 34 19 37 23" stroke="#bbf7d0" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/>
  <path d="M24 23 C28 25 33 26 36 29" stroke="#bbf7d0" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <path d="M24 30 C28 31 32 32 34 34" stroke="#bbf7d0" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>

  <!-- Subtle highlight on upper-left of leaf -->
  <path
    d="M24 4 C24 4 12 9 9 19 C14 14 20 10 24 8 Z"
    fill="#bbf7d0"
    opacity="0.25"
  />

  <!-- Small checkmark / verified dot at center -->
  <circle cx="24" cy="24" r="4.5" fill="#fff" opacity="0.18"/>
  <path d="M21.5 24 L23.2 25.8 L26.5 22.5" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
